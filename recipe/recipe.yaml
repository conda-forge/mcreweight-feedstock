schema_version: 1

context:
  name: mcreweight
  version: "0.3.2"
  python_min: "3.8"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mcreweight-${{ version }}.tar.gz
  sha256: 0b0bea50a9b31346ff6751a992369797419c188db1153c7d5dd5a534078b2983

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - run-reweight = scripts.run_reweighting:main
      - apply-weights = scripts.apply_weights:main

requirements:
  host:
    - python 3.8.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - numpy >=1.20.0
    - pandas >=1.3.0
    - matplotlib-base >=3.4.0
    - scikit-learn >=1.0.0
    - optuna >=2.10.0
    - hep_ml >=0.7.0
    - seaborn >=0.11.0
    - awkward-pandas >=2023.8.0
    - numexpr >=2.7.0
    - uproot >=5.0.0,!=5.6.8
    - awkward >=2.6.0

tests:
  - python:
      imports:
        - mult_and_kin_reweight
        - scripts
        - utils
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - python ${{ python_min }}
        - pip
    script:
      - run-reweight --help
      - apply-weights --help

about:
  summary: Tools for reweighting Monte Carlo samples to match experimental data distributions
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/tfulghes/mcreweight

extra:
  recipe-maintainers:
    - tfulghes7

